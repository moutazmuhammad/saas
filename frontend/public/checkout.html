<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - CloudOdoo</title>
    <meta name="description" content="Complete your purchase.">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 5 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="fas fa-cloud me-2"></i>
                <span class="fw-bold">CloudOdoo</span>
            </a>
            <div class="ms-auto d-flex align-items-center gap-3">
                <span class="text-muted small">
                    <i class="fas fa-lock me-1"></i>Secure Checkout
                </span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <section class="py-6" style="padding-top:120px;">
        <div class="container">
            <div class="mb-4">
                <h1 class="h3">Complete Your Order</h1>
                <p class="text-muted">Secure payment powered by SSL encryption</p>
            </div>

            <div id="checkout-content">
                <!-- Checkout content will be rendered by JavaScript -->
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="d-flex flex-wrap justify-content-between align-items-center py-3">
                <div class="d-flex align-items-center">
                    <i class="fas fa-cloud text-primary me-2"></i>
                    <span class="fw-bold">CloudOdoo</span>
                </div>
                <div class="d-flex align-items-center gap-4">
                    <img src="https://img.shields.io/badge/SSL-Secured-green?style=flat-square" alt="SSL Secured" height="20">
                    <span class="text-muted small">&copy; 2026 CloudOdoo</span>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="/js/app.js"></script>
</body>
</html>
