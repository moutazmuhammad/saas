<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Instances - CloudOdoo</title>
    <meta name="description" content="Manage your cloud instances.">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 5 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="fas fa-cloud me-2"></i>
                <span class="fw-bold">CloudOdoo</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" href="/services.html">Services</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/my-instances.html">My Instances</a>
                    </li>
                    <li class="nav-item dropdown ms-lg-3">
                        <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" role="button" data-bs-toggle="dropdown">
                            <div class="d-flex align-items-center justify-content-center rounded-circle me-2" 
                                 style="width:32px;height:32px;background:var(--primary);font-size:0.8rem;">
                                JD
                            </div>
                            <span class="d-none d-lg-inline">John Doe</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="#"><i class="fas fa-user me-2"></i>Profile</a></li>
                            <li><a class="dropdown-item" href="#"><i class="fas fa-cog me-2"></i>Settings</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="/login.html"><i class="fas fa-sign-out-alt me-2"></i>Sign Out</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <section class="py-6" style="padding-top:120px;">
        <div class="container">
            <div class="row">
                <!-- Sidebar -->
                <div class="col-lg-3 mb-4">
                    <div class="portal-sidebar">
                        <nav class="nav flex-column">
                            <a class="nav-link active" href="/my-instances.html">
                                <i class="fas fa-server"></i>
                                My Instances
                            </a>
                            <a class="nav-link" href="#">
                                <i class="fas fa-file-invoice-dollar"></i>
                                Billing
                            </a>
                            <a class="nav-link" href="#">
                                <i class="fas fa-user"></i>
                                Profile
                            </a>
                            <a class="nav-link" href="#">
                                <i class="fas fa-cog"></i>
                                Settings
                            </a>
                        </nav>
                    </div>
                </div>

                <!-- Main Content -->
                <div class="col-lg-9">
                    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
                        <div>
                            <h1 class="h3 mb-1">My Instances</h1>
                            <p class="text-muted mb-0">Manage your deployed cloud instances</p>
                        </div>
                        <div class="d-flex align-items-center gap-3 mt-3 mt-md-0">
                            <select class="form-select form-select-sm" id="sort-select" style="width:auto;">
                                <option value="date">Sort by Date</option>
                                <option value="name">Sort by Name</option>
                                <option value="status">Sort by Status</option>
                            </select>
                            <a href="/services.html" class="btn btn-primary btn-sm">
                                <i class="fas fa-plus me-1"></i>New Instance
                            </a>
                        </div>
                    </div>

                    <div class="info-card" id="instances-list">
                        <!-- Instances will be rendered here by JavaScript -->
                        <div class="text-center py-5">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="d-flex flex-wrap justify-content-between align-items-center py-3">
                <div class="d-flex align-items-center">
                    <i class="fas fa-cloud text-primary me-2"></i>
                    <span class="fw-bold">CloudOdoo</span>
                </div>
                <p class="text-muted small mb-0">&copy; 2026 CloudOdoo. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="/js/app.js"></script>
    <style>
        .dropdown-menu {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
        }
        .dropdown-item {
            color: var(--text-secondary);
        }
        .dropdown-item:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }
        .dropdown-divider {
            border-color: var(--border-color);
        }
    </style>
</body>
</html>
