<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - CloudOdoo</title>
    <meta name="description" content="Create your CloudOdoo account and start your free trial.">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 5 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="fas fa-cloud me-2"></i>
                <span class="fw-bold">CloudOdoo</span>
            </a>
            <div class="ms-auto">
                <a class="btn btn-outline-light btn-sm" href="/login.html">Sign In</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <section class="py-6 d-flex align-items-center min-vh-100" style="padding-top:100px;">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6 col-xl-5">
                    <div class="info-card" id="registration-container">
                        <!-- Form will be rendered by JavaScript -->
                        <div class="text-center py-5">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="d-flex flex-wrap justify-content-between align-items-center py-3">
                <div class="d-flex align-items-center">
                    <i class="fas fa-cloud text-primary me-2"></i>
                    <span class="fw-bold">CloudOdoo</span>
                </div>
                <p class="text-muted small mb-0">&copy; 2026 CloudOdoo. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="/js/app.js"></script>
</body>
</html>
